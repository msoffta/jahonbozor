services:
    postgres:
        image: postgres:latest
        container_name: postgres
        hostname: postgres
        environment:
            POSTGRES_USER: ${DATABASE_USER}
            POSTGRES_DB: ${DATABASE_NAME}
            POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
            TZ: Asia/Tashkent
            PGTZ: Asia/Tashkent
        volumes:
            - postgres_data:/var/lib/postgresql
            - ./logs:/var/log/postgresql
        command: >
            postgres -c logging_collector=on
                     -c log_directory=/var/log/postgresql
                     -c log_filename=postgresql.log
                     -c log_statement=all
                     -c log_connections=on
                     -c log_disconnections=on
                     -c log_destination=stderr,csvlog
                     -c log_rotation_age=1d
                     -c shared_preload_libraries=pg_stat_statements
                     -c pg_stat_statements.track=all
        restart: unless-stopped
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U $${DATABASE_USER} -d $${DATABASE_NAME}",
                ]
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 20s
        networks:
            - app-network

    backend:
        build:
            context: .
            dockerfile: apps/backend/Dockerfile
        container_name: backend
        restart: unless-stopped
        environment:
            DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
            JWT_SECRET: ${JWT_SECRET}
            NODE_ENV: ${NODE_ENV:-production}
            SENTRY_DSN: ${SENTRY_DSN}
            SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
            TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - app-network

    bot:
        build:
            context: .
            dockerfile: apps/bot/Dockerfile
        container_name: bot
        restart: unless-stopped
        environment:
            DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
            TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
            TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
            BOT_PORT: 3001
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - app-network

    nginx:
        image: nginx:alpine
        container_name: nginx
        restart: unless-stopped
        volumes:
            - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
            - ./apps/frontend/admin/dist:/usr/share/nginx/html/admin:ro
            - ./apps/frontend/user/dist:/usr/share/nginx/html/user:ro
        depends_on:
            - backend
            - bot
        networks:
            - app-network
            - nginx_network

networks:
    app-network:
        driver: bridge
    nginx_network:
        external: true

volumes:
    postgres_data:
